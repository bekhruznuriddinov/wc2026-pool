<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — HCAP World Cup 2026</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="predictions.html" class="logo-wrap">
      <img src="https://images.squarespace-cdn.com/content/v1/6334ad5adde1f249453ad01a/1664396655469-ZPR66CXLS6CHH5MLB32I/HCAP-Partners.png?format=300w"
           alt="HCAP Partners" class="logo-img">
      <div class="logo-divider"></div>
      <span class="logo-label">World Cup 2026</span>
    </a>
    <nav style="display:flex;gap:0.25rem">
      <a href="predictions.html" class="nav-link">My Picks</a>
      <a href="leaderboard.html" class="nav-link active">Leaderboard</a>
    </nav>
    <div id="userBar"></div>
  </div>
</nav>

<div class="page">

  <div class="page-header" style="margin-top:1.5rem">
    <h1>Leaderboard</h1>
    <p>Rankings update automatically as match results are entered.</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="playerCount">—</div>
      <div class="stat-label">Players</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="roundsComplete">—</div>
      <div class="stat-label">Rounds complete</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="topScore">—</div>
      <div class="stat-label">Top score</div>
    </div>
  </div>

  <div id="loading" class="loading-center">
    <div class="spinner"></div>
    <span>Loading standings…</span>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <div id="tableWrap"></div>
  </div>


</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>

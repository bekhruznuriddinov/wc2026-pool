<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — World Cup 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-stars"></div>

<div class="page">

  <header class="site-header">
    <a href="predictions.html" class="logo">
      <span class="trophy">🏆</span> WC 2026 Pool
    </a>
    <nav>
      <a href="predictions.html" class="btn btn-ghost">My Picks</a>
      <a href="leaderboard.html" class="btn btn-ghost" style="color:var(--text)">Leaderboard</a>
    </nav>
  </header>

  <div style="margin-bottom:1.5rem">
    <h1 style="font-size:1.6rem;font-weight:700">Leaderboard</h1>
    <p class="text-muted" style="margin-top:0.25rem">Rankings update as results come in</p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="playerCount">—</div>
      <div class="stat-label">Players</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="roundsComplete">—</div>
      <div class="stat-label">Rounds done</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="topScore">—</div>
      <div class="stat-label">Top score</div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="loading-center">
    <div class="spinner"></div>
  </div>

  <!-- Table -->
  <div class="card" style="padding:0;overflow:hidden">
    <div id="tableWrap"></div>
  </div>

  <div style="text-align:center;margin-top:1.5rem">
    <a href="index.html" class="btn btn-ghost">Join the pool</a>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCAP World Cup 2026 — Predictions Pool</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="index.html" class="logo-wrap">
      <img src="https://images.squarespace-cdn.com/content/v1/6334ad5adde1f249453ad01a/1664396655469-ZPR66CXLS6CHH5MLB32I/HCAP-Partners.png?format=300w"
           alt="HCAP Partners" class="logo-img">
      <div class="logo-divider"></div>
      <span class="logo-label">World Cup 2026</span>
    </a>
    <a href="leaderboard.html" class="nav-link">Leaderboard</a>
  </div>
</nav>

<div class="page" style="max-width:480px">

  <div class="hero" style="margin-top:2rem">
    <div class="hero-icon">🏆</div>
    <h1>World Cup <span>2026</span><br>Predictions Pool</h1>
    <p style="margin-top:0.5rem">Pick the winners. Climb the rankings. Bragging rights included.</p>
  </div>

  <div class="card">
    <h2 style="font-size:1rem;font-weight:600;color:var(--navy);margin-bottom:1.25rem">Sign in to join</h2>

    <div id="alertBox" class="alert" style="display:none"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="nameInput">Your name</label>
        <input type="text" id="nameInput" placeholder="e.g. Alex Johnson" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="emailInput">Work email</label>
        <input type="email" id="emailInput" placeholder="you@hcap.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary">Enter the Pool →</button>
    </form>

    <p class="text-muted text-small" style="text-align:center;margin-top:1rem">
      Returning? Use the same email to pick up where you left off.
    </p>
  </div>

  <div style="text-align:center;margin-top:1rem">
    <a href="leaderboard.html" class="btn btn-ghost">View leaderboard</a>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js?v=11"></script>
<script src="js/auth.js?v=11"></script>
</body>
</html>

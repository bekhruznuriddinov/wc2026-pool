<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 — Office Predictions Pool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-stars"></div>

<div class="page" style="max-width:480px">

  <div style="text-align:center;padding:3rem 0 2rem">
    <div style="font-size:3rem;margin-bottom:1rem">🏆</div>
    <h1 style="font-size:2rem;font-weight:700;margin-bottom:0.5rem">
      World Cup <span style="color:var(--gold)">2026</span>
    </h1>
    <p class="text-muted">Office Predictions Pool</p>
  </div>

  <div class="card">
    <h2 style="font-size:1.1rem;margin-bottom:1.25rem">Join the pool</h2>

    <div id="alertBox" class="alert" style="display:none"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="nameInput">Your name</label>
        <input type="text" id="nameInput" placeholder="e.g. Alex Johnson" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="emailInput">Work email</label>
        <input type="email" id="emailInput" placeholder="you@company.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary">Enter the Pool →</button>
    </form>

    <p class="text-muted text-small" style="text-align:center;margin-top:1rem">
      Returning? Use the same email to pick up where you left off.
    </p>
  </div>

  <div style="text-align:center;margin-top:1.25rem">
    <a href="leaderboard.html" class="btn btn-ghost">View leaderboard</a>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>

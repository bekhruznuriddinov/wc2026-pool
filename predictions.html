<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Picks — HCAP World Cup 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="predictions.html" class="logo-wrap">
      <img src="https://images.squarespace-cdn.com/content/v1/6334ad5adde1f249453ad01a/1664396655469-ZPR66CXLS6CHH5MLB32I/HCAP-Partners.png?format=300w"
           alt="HCAP Partners" class="logo-img">
      <div class="logo-divider"></div>
      <span class="logo-label">World Cup 2026</span>
    </a>
    <nav class="topnav-links">
      <a href="predictions.html" class="nav-link active">📋 My Picks</a>
      <a href="leaderboard.html" class="nav-link">🏆 Leaderboard</a>
      <a href="stats.html" class="nav-link">📊 Stats</a>
    </nav>
    <div id="userBar"></div>
  </div>
</nav>

<div class="page wide">

  <div class="page-header" style="margin-top:1.5rem">
    <h1>My Predictions</h1>
    <p>Select the winner for each match before the round deadline.</p>
  </div>

  <div id="roundTabs" class="rounds-nav"></div>

  <div id="loading" class="loading-center">
    <div class="spinner"></div>
    <span>Loading matches…</span>
  </div>

  <div id="noRounds" style="display:none">
    <div class="empty-state">
      <div class="icon">⏳</div>
      <h3>No rounds open yet</h3>
      <p>Check back once the knockout stage begins. We'll send a heads up.</p>
    </div>
  </div>

  <div id="roundContent" style="display:none">
    <div id="roundHeader" class="round-header"></div>
    <div id="roundAlert"></div>
    <div id="scoringBanner"></div>
    <div id="viewToggle" style="display:none"></div>
    <div id="matchesList" class="matches-grid"></div>
  </div>

  <div id="submitBar" class="submit-bar" style="display:none">
    <span id="pickCount" style="font-weight:600;color:#fff"></span>
    <span id="saveStatus" class="save-indicator"></span>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js?v=6"></script>
<script src="js/auth.js?v=6"></script>
<script src="js/predictions.js?v=6"></script>
</body>
</html>
